<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#EEF1F2; --surface:#FFFFFF; --ink:#10262B;
  --primary:#0F3D3E; --primary-light:#155C56; --primary-dark:#0A2A2B;
  --accent:#E8A33D; --accent-dark:#C4831F;
  --accent-2:#5B2A86; --accent-2-light:#7A45AD;
  --danger:#C1443C; --good:#2F9E68;
  --border:#DDE3E2; --muted:#5B6E6C;
  --mono:'IBM Plex Mono',monospace; --serif:'Fraunces',serif; --sans:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans); background:var(--bg); color:var(--ink);
  min-height:100vh; padding-bottom:90px;
}
.tabular{font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:.01em;}
h1,h2,h3{font-family:var(--serif); margin:0;}
button{font-family:var(--sans); cursor:pointer;}
input,select{font-family:var(--sans);}

/* ---------- Top bar ---------- */
.topbar{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff; padding:18px 18px 22px; border-radius:0 0 22px 22px;
  position:relative; overflow:hidden;
}
.topbar::after{
  content:''; position:absolute; right:-30px; top:-30px; width:160px; height:160px; border-radius:50%;
  background:radial-gradient(circle, rgba(232,163,61,.25), transparent 70%);
}
.topbar-row{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; position:relative; z-index:1;}
.fam-name{font-size:20px; font-weight:700;}
.month-pill{
  font-family:var(--mono); font-size:12px; background:rgba(255,255,255,.14);
  padding:5px 12px; border-radius:999px; white-space:nowrap;
}
.top-right{display:flex; align-items:center; gap:8px;}
.sync-dot{
  width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.14); border:none;
  display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0;
}
.room-badge{
  font-family:var(--mono); font-size:11px; background:rgba(255,255,255,.14); color:#fff;
  padding:8px 12px; border-radius:10px; word-break:break-all; display:flex; justify-content:space-between; align-items:center; gap:8px;
}
.active-member-select{
  margin-top:14px; display:flex; align-items:center; gap:8px; position:relative; z-index:1;
}
.active-member-select select{
  background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.25);
  border-radius:10px; padding:7px 10px; font-size:13.5px; font-weight:600;
}
.active-member-select label{font-size:11.5px; opacity:.75; text-transform:uppercase; letter-spacing:.08em;}

/* ---------- Content ---------- */
.wrap{max-width:640px; margin:0 auto; padding:18px 14px 0;}
.section-title{
  font-family:var(--mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.1em;
  color:var(--muted); margin:22px 2px 10px; display:flex; align-items:center; gap:8px;
}
.section-title::after{content:''; flex:1; height:1px; background:var(--border);}

.card{
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:16px; margin-bottom:12px; box-shadow:0 1px 2px rgba(16,38,43,.03);
}
.card + .card{margin-top:0;}

/* member passbook card */
.member-card{position:relative;}
.member-head{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.member-id{display:flex; align-items:center; gap:10px;}
.avatar{
  width:42px; height:42px; border-radius:12px; background:var(--bg); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:21px; flex-shrink:0;
}
.member-name{font-weight:700; font-size:15.5px;}
.member-job{font-size:12px; color:var(--muted);}
.badges{display:flex; gap:4px; flex-wrap:wrap; margin-top:4px;}
.badge{font-size:10px; background:rgba(232,163,61,.16); color:var(--accent-dark); padding:2px 7px; border-radius:999px; font-weight:600;}
.stat-row{display:flex; gap:10px; margin-top:12px;}
.stat{flex:1; background:var(--bg); border-radius:12px; padding:10px 12px;}
.stat .label{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:3px;}
.stat .value{font-size:16.5px; font-weight:600;}
.stat .value.neg{color:var(--danger);}
.stat .value.pos{color:var(--good);}

.vault-card{
  background:linear-gradient(135deg, var(--accent-2), #43225F); color:#fff; border:none;
}
.vault-card .label{color:rgba(255,255,255,.7);}
.vault-card .value{font-size:26px; font-weight:700;}

/* buttons */
.btn{
  border:none; border-radius:11px; padding:11px 16px; font-weight:600; font-size:14px;
  display:inline-flex; align-items:center; justify-content:center; gap:6px; width:100%;
}
.btn-primary{background:var(--primary); color:#fff;}
.btn-accent{background:var(--accent); color:#3A2705;}
.btn-ghost{background:var(--bg); color:var(--ink); border:1px solid var(--border);}
.btn-danger{background:rgba(193,68,60,.1); color:var(--danger);}
.btn-sm{width:auto; padding:8px 12px; font-size:13px;}
.btn-row{display:flex; gap:8px;}
.btn-row .btn{flex:1;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.45; pointer-events:none;}

.big-cta{
  padding:16px; font-size:15.5px; border-radius:14px; box-shadow:0 6px 18px rgba(232,163,61,.35);
}

label.field-label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin:10px 0 5px;}
input[type=text], input[type=number], select.field{
  width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--border);
  background:var(--bg); font-size:14.5px; color:var(--ink);
}
input:focus, select:focus{outline:2px solid var(--primary); outline-offset:1px;}

.pill-tabs{display:flex; gap:4px; overflow-x:auto; padding:2px; margin-bottom:4px;}
.pill-tabs::-webkit-scrollbar{display:none;}
.pill{
  flex-shrink:0; padding:8px 13px; border-radius:999px; font-size:12.5px; font-weight:600;
  background:var(--bg); color:var(--muted); border:1px solid var(--border); white-space:nowrap;
}
.pill.on{background:var(--primary); color:#fff; border-color:var(--primary);}

/* bottom nav */
.bottomnav{
  position:fixed; bottom:0; left:0; right:0; background:var(--surface);
  border-top:1px solid var(--border); display:flex; z-index:20;
  padding-bottom:env(safe-area-inset-bottom);
  overflow-x:auto; -webkit-overflow-scrolling:touch;
}
.navbtn{
  flex:1 0 auto; min-width:58px; background:none; border:none; padding:9px 2px 7px; display:flex; flex-direction:column;
  align-items:center; gap:3px; font-size:9.5px; color:var(--muted); font-weight:700;
}
.navbtn .ic{font-size:19px;}
.navbtn.on{color:var(--primary);}
/* ---------- proste elementy przyjazne młodszym dzieciom ---------- */
.kid-box{
  background:linear-gradient(135deg,#FFF6E6,#FFFFFF); border:2px dashed var(--accent);
  border-radius:16px; padding:14px; margin-bottom:12px;
}
.kid-box h3{font-size:17px; margin-bottom:6px;}
.kid-box p{font-size:14.5px; line-height:1.6; margin:0 0 6px;}
.step-num{
  display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px;
  background:var(--primary); color:#fff; border-radius:50%; font-size:12px; font-weight:700; margin-right:8px; flex-shrink:0;
}
.step-row{display:flex; align-items:flex-start; gap:0; margin-bottom:10px;}
.browser-bar{
  display:flex; align-items:center; gap:8px; background:var(--bg); border:1px solid var(--border);
  border-radius:10px; padding:8px 12px; font-family:var(--mono); font-size:12.5px; color:var(--muted); margin-bottom:10px;
}
.browser-page{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; min-height:160px;}
.quiz-q{margin-bottom:14px;}
.quiz-q .qtext{font-weight:700; margin-bottom:8px; font-size:14.5px;}
.quiz-opt{display:block; width:100%; text-align:left; margin-bottom:6px;}
.quiz-opt.picked{background:var(--primary); color:#fff; border-color:var(--primary);}
.doc-card{background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; border-radius:14px; padding:16px; margin-bottom:12px;}
.doc-card .dl{font-size:11px; opacity:.75; text-transform:uppercase; letter-spacing:.06em;}
.doc-card .dv{font-family:var(--mono); font-size:15px; font-weight:700; margin-top:2px;}
.progress-track{background:var(--bg); border-radius:999px; height:14px; overflow:hidden; margin:8px 0;}
.progress-fill{background:linear-gradient(90deg,var(--accent),var(--accent-dark)); height:100%; border-radius:999px; transition:width .3s ease;}
.rank-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border);}
.rank-row:last-child{border-bottom:none;}
.rank-pos{font-family:var(--mono); font-weight:700; width:22px; text-align:center;}

/* flash message */
.flash{
  position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:50;
  background:var(--ink); color:#fff; padding:11px 18px; border-radius:12px; font-size:13.5px;
  max-width:88vw; box-shadow:0 8px 24px rgba(0,0,0,.25); text-align:center;
}
.flash.err{background:var(--danger);}
.flash.ok{background:var(--good);}

/* shop */
.shop-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.shop-item{background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:12px; text-align:center;}
.shop-item .em{font-size:26px;}
.shop-item .nm{font-size:12.5px; font-weight:600; margin:6px 0 2px; min-height:32px; display:flex; align-items:center; justify-content:center;}
.shop-item .pr{font-family:var(--mono); font-size:13px; color:var(--muted); margin-bottom:8px;}

.hist-item{display:flex; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px;}
.hist-item:last-child{border-bottom:none;}
.hist-m{font-family:var(--mono); color:var(--muted); font-size:11px; white-space:nowrap;}

textarea.code-area{
  width:100%; min-height:90px; border-radius:10px; border:1px solid var(--border);
  background:var(--bg); padding:10px; font-family:var(--mono); font-size:11.5px; resize:vertical;
}
.setup-screen{max-width:440px; margin:60px auto; padding:0 18px;}
.setup-logo{font-size:44px; text-align:center; margin-bottom:6px;}
.member-input-row{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
.member-input-row select{width:64px; flex-shrink:0;}
.small-x{background:none;border:none;color:var(--danger);font-size:18px;padding:0 6px;}
.muted{color:var(--muted); font-size:12.5px;}
.disclaimer{font-size:11px; color:var(--muted); line-height:1.5; margin-top:8px;}
hr.sep{border:none; border-top:1px solid var(--border); margin:14px 0;}
</style>

let AppState = null;
let currentTab = 'pulpit';
let flashMsg = null;
let flashTimer = null;
let onlineOk = null; // null = nieznany/offline tryb, true = połączono, false = błąd połączenia
let setupMode = 'new'; // 'new' | 'join'
const JSONBLOB_BASE = 'https://jsonblob.com/api/jsonBlob';

function setOnlineStatus(v){ onlineOk = v; }

/* ---------------- persistence ---------------- */
function loadState(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}
function saveState(){
  AppState.rev = (AppState.rev||0) + 1;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(AppState));
  pushRoom();
}

/* ---------------- online sync (jsonblob.com) ---------------- */
function pushRoom(){
  if(!AppState || !AppState.roomId) return;
  fetch(`${JSONBLOB_BASE}/${AppState.roomId}`, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(AppState)
  }).then(res=>{ setOnlineStatus(!!res.ok); })
    .catch(()=>{ setOnlineStatus(false); });
}

async function pullRoom(silent){
  if(!AppState || !AppState.roomId) return;
  try{
    const res = await fetch(`${JSONBLOB_BASE}/${AppState.roomId}`);
    if(!res.ok) throw new Error('not found');
    const remote = await res.json();
    setOnlineStatus(true);
    if((remote.rev||0) > (AppState.rev||0)){
      const active = document.activeElement;
      const typing = active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA');
      if(typing) return; // nie nadpisuj, gdy ktoś właśnie coś wpisuje - spróbujemy przy kolejnym odświeżeniu
      const keepActiveTab = currentTab;
      AppState = remote;
      migrateState();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(AppState));
      if(!getActiveMemberId() || !findMember(getActiveMemberId())){
        if(AppState.members[0]) setActiveMemberId(AppState.members[0].id);
      }
      currentTab = keepActiveTab;
      if(!silent) flash('Zsynchronizowano z innymi telefonami.','ok');
      render();
    }
  }catch(e){
    setOnlineStatus(false);
  }
}

async function createRoom(silent){
  try{
    const res = await fetch(JSONBLOB_BASE, {
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify(AppState)
    });
    if(!res.ok) throw new Error('fail');
    const loc = res.headers.get('Location') || res.headers.get('location');
    if(!loc) throw new Error('no location header');
    AppState.roomId = loc.split('/').pop();
    setOnlineStatus(true);
    saveState();
    if(!silent) flash('Tryb online włączony — kod pokoju znajdziesz w zakładce Więcej.','ok');
  }catch(e){
    setOnlineStatus(false);
    if(!silent) flash('Nie udało się włączyć trybu online. Zostań przy kodzie ręcznym w zakładce Więcej.','err');
  }
  render();
}

async function joinRoom(roomId){
  roomId = (roomId||'').trim();
  if(!roomId) return flash('Podaj kod pokoju.','err');
  try{
    const res = await fetch(`${JSONBLOB_BASE}/${roomId}`);
    if(!res.ok) throw new Error('not found');
    const remote = await res.json();
    if(!remote.members) throw new Error('bad data');
    remote.roomId = roomId;
    AppState = remote;
    migrateState();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(AppState));
    if(AppState.members[0]) setActiveMemberId(AppState.members[0].id);
    setOnlineStatus(true);
    flash('Dołączono do rodziny! Wybierz siebie na górze ekranu.','ok');
    currentTab='pulpit';
    render();
  }catch(e){
    flash('Nie udało się dołączyć — sprawdź kod pokoju i internet.','err');
  }
}
function getActiveMemberId(){
  return localStorage.getItem(ACTIVE_KEY);
}
function setActiveMemberId(id){
  localStorage.setItem(ACTIVE_KEY, id);
}

function uid(){ return Math.random().toString(36).slice(2,9); }

function flash(text, type){
  flashMsg = {text, type: type||'info'};
  clearTimeout(flashTimer);
  render();
  flashTimer = setTimeout(()=>{ flashMsg=null; render(); }, 2600);
}

function fmt(n){
  n = Math.round(n*100)/100;
  return n.toLocaleString('pl-PL', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' zł';
}
function fmtShort(n){
  return Math.round(n).toLocaleString('pl-PL') + ' zł';
}

/* migracja starych zapisów gry do nowych pól (krypto/dokumenty/karta) */
function migrateState(){
  if(!AppState) return;
  if(!AppState.crypto) AppState.crypto = {...CRYPTO_FALLBACK};
  Object.keys(CRYPTO_FALLBACK).forEach(c=>{ if(AppState.crypto[c]===undefined) AppState.crypto[c] = CRYPTO_FALLBACK[c]; });
  if(AppState.familyGoal===undefined) AppState.familyGoal = null;
  (AppState.members||[]).forEach(m=>{
    if(!m.cryptoHoldings) m.cryptoHoldings = emptyCryptoHoldings();
    Object.keys(CRYPTO_FALLBACK).forEach(c=>{ if(m.cryptoHoldings[c]===undefined) m.cryptoHoldings[c]=0; });
    if(m.lastName===undefined) m.lastName = '';
    if(m.pesel===undefined) m.pesel = null;
    if(m.idCard===undefined) m.idCard = null;
    if(m.driverLicense===undefined) m.driverLicense = null;
    if(m.birthDate===undefined) m.birthDate = '';
    if(m.gender===undefined) m.gender = 'K';
    if(m.quizBest===undefined) m.quizBest = 0;
    if(m.creditCard===undefined) m.creditCard = null;
  });
}

function logHist(text){
  AppState.history.unshift({month: AppState.month, text});
  if(AppState.history.length>200) AppState.history.pop();
}

/* ---------------- core actions ---------------- */
function findMember(id){ return AppState.members.find(m=>m.id===id); }

function transfer(fromType, fromId, toType, toId, amount){
  amount = Number(amount);
  if(!amount || amount<=0) return flash('Podaj poprawną kwotę.','err');
  let fromBal, toBal;
  if(fromType==='vault'){ fromBal = AppState.vault; } else { fromBal = findMember(fromId).balance; }
  if(fromBal < amount) return flash('Za mało środków na koncie źródłowym.','err');

  if(fromType==='vault') AppState.vault -= amount; else findMember(fromId).balance -= amount;
  if(toType==='vault') AppState.vault += amount; else findMember(toId).balance += amount;

  const fromName = fromType==='vault' ? 'Skarbca rodzinnego' : findMember(fromId).name;
  const toName = toType==='vault' ? 'Skarbiec rodzinny' : findMember(toId).name;
  logHist(`Przelew ${fmtShort(amount)}: ${fromName} → ${toName}`);
  saveState();
  flash('Przelew wykonany.','ok');
  render();
}

function depositSavings(memberId, amount){
  amount = Number(amount);
  const m = findMember(memberId);
  if(!amount || amount<=0) return flash('Podaj poprawną kwotę.','err');
  if(m.balance < amount) return flash('Za mało środków na koncie.','err');
  m.balance -= amount; m.savings += amount;
  logHist(`${m.name} wpłacił ${fmtShort(amount)} do oszczędności`);
  saveState(); flash('Wpłacono do oszczędności.','ok'); render();
}
function withdrawSavings(memberId, amount){
  amount = Number(amount);
  const m = findMember(memberId);
  if(!amount || amount<=0) return flash('Podaj poprawną kwotę.','err');
  if(m.savings < amount) return flash('Za mało środków w oszczędnościach.','err');
  m.savings -= amount; m.balance += amount;
  logHist(`${m.name} wypłacił ${fmtShort(amount)} z oszczędności`);
  saveState(); flash('Wypłacono z oszczędności.','ok'); render();
}

function setJob(memberId, title, salary){
  const m = findMember(memberId);
  m.job = { title, salary: Number(salary) };
  logHist(`${m.name} podjął pracę: ${title} (${fmtShort(salary)}/mies.)`);
  saveState(); flash('Zapisano pracę.','ok'); render();
}
function quitJob(memberId){
  const m = findMember(memberId);
  m.job = null;
  saveState(); render();
}

function autoTaxRate(salary){
  if(salary<=0) return 0;
  if(salary<=3000) return 0.15;
  if(salary<=7000) return 0.23;
  if(salary<=15000) return 0.28;
  return 0.34;
}

function takeLoan(memberId, amount, months){
  amount = Number(amount); months = Number(months);
  const m = findMember(memberId);
  if(!amount || amount<=0) return flash('Podaj poprawną kwotę.','err');
  if(AppState.vault < amount) return flash('Skarbiec rodzinny nie ma tylu środków, żeby udzielić pożyczki.','err');
  const r = LOAN_ANNUAL_RATE/12;
  const payment = amount * r / (1-Math.pow(1+r,-months));
  AppState.vault -= amount;
  m.balance += amount;
  m.loans.push({id:uid(), principal:amount, monthsLeft:months, totalMonths:months, payment});
  logHist(`${m.name} wziął pożyczkę ${fmtShort(amount)} na ${months} mies. (rata ${fmtShort(payment)})`);
  saveState(); flash('Pożyczka przyznana.','ok'); render();
}

function buyBond(memberId, bondId, amount){
  amount = Number(amount);
  const m = findMember(memberId);
  const type = BOND_TYPES.find(b=>b.id===bondId);
  if(!amount || amount<=0) return flash('Podaj poprawną kwotę.','err');
  if(m.balance < amount) return flash('Za mało środków na koncie.','err');
  m.balance -= amount;
  m.bondsHeld.push({id:uid(), typeId:bondId, name:type.name, principal:amount, accrued:0, rate:type.rate, monthsLeft:type.months, totalMonths:type.months});
  logHist(`${m.name} kupił obligacje ${type.name} za ${fmtShort(amount)}`);
  saveState(); flash('Zakupiono obligacje.','ok'); render();
}

function tradeCrypto(memberId, coin, pln, mode){
  pln = Number(pln);
  const m = findMember(memberId);

/* ---------------- URZĄD GMINY: PESEL i dowód osobisty (pełna rejestracja) ---------------- */
function genPesel(birthDateStr, genderChar){
  // birthDateStr: YYYY-MM-DD
  const d = new Date(birthDateStr);
  let year = d.getFullYear(), month = d.getMonth()+1, day = d.getDate();
  let mm = month;
  // kodowanie stulecia zgodnie z realnym schematem PESEL
  if(year>=1900 && year<=1999) mm = month;
  else if(year>=2000 && year<=2099) mm = month+20;
  else if(year>=2100 && year<=2199) mm = month+40;
  else if(year>=1800 && year<=1899) mm = month+80;
  else mm = month+60;
  const rr = String(year%100).padStart(2,'0');
  const mmStr = String(mm).padStart(2,'0');
  const ddStr = String(day).padStart(2,'0');
  let serial = String(Math.floor(Math.random()*1000)).padStart(3,'0');
  // ostatnia cyfra serii koduje płeć: parzysta = kobieta, nieparzysta = mężczyzna
  let genderDigit = Math.floor(Math.random()*10);
  if(genderChar==='M' && genderDigit%2===0) genderDigit = (genderDigit+1)%10;
  if(genderChar==='K' && genderDigit%2===1) genderDigit = (genderDigit+1)%10;
  const base = rr+mmStr+ddStr+serial+genderDigit; // 10 cyfr
  const weights = [1,3,7,9,1,3,7,9,1,3];
  let sum = 0;
  for(let i=0;i<10;i++) sum += Number(base[i])*weights[i];
  const check = (10 - (sum%10))%10;
  return base+check;
}
function genIdCardNumber(){
  const letters = 'ABCDEFGHIJKLMNOPRSTUWXYZ';
  let s = '';
  for(let i=0;i<3;i++) s += letters[Math.floor(Math.random()*letters.length)];
  s += String(Math.floor(100000+Math.random()*900000));
  return s;
}
function registerCitizen(memberId, birthDate, gender, lastName){
  const m = findMember(memberId);
  if(!birthDate) return flash('Podaj datę urodzenia.','err');
  if(m.pesel) return flash(`${m.name} jest już zarejestrowany/a w urzędzie.`,'err');
  m.birthDate = birthDate;
  m.gender = gender;
  if(lastName && lastName.trim()) m.lastName = lastName.trim();
  m.pesel = genPesel(birthDate, gender);
  m.idCard = genIdCardNumber();
  logHist(`🏛️ ${m.name} zarejestrował/a się w Urzędzie Gminy — nadano PESEL i wyrobiono dowód osobisty.`);
  saveState(); flash('Gratulacje! Masz PESEL i dowód osobisty.','ok'); render();
}
function ageFromBirth(birthDateStr){
  if(!birthDateStr) return 0;
  const b = new Date(birthDateStr);
  const now = new Date();
  let age = now.getFullYear() - b.getFullYear();
  const m = now.getMonth() - b.getMonth();
  if(m<0 || (m===0 && now.getDate()<b.getDate())) age--;
  return age;
}

/* ---------------- RANKING RODZINNY (gamifikacja) ---------------- */
function netWorth(m){
  const cryptoVal = Object.entries(m.cryptoHoldings).reduce((s,[c,q])=>s+q*AppState.crypto[c],0);
  const bondsVal = m.bondsHeld.reduce((s,b)=>s+b.principal+b.accrued,0);
  const debt = m.loans.reduce((s,l)=>s+l.payment*l.monthsLeft,0) + (m.creditCard?m.creditCard.used:0);
  return m.balance + m.savings + cryptoVal + bondsVal - debt;
}
function computeLevel(m){
  const nw = netWorth(m);
  const levels = [
    {min:0, title:'🌱 Początkujący', lvl:1},
    {min:2000, title:'🪙 Oszczędny', lvl:2},
    {min:10000, title:'📈 Inwestor', lvl:3},
    {min:50000, title:'💼 Zamożny', lvl:4},
    {min:200000, title:'💎 Bogaty', lvl:5},
    {min:1000000, title:'👑 Milioner', lvl:6},
  ];
  let cur = levels[0];
  levels.forEach(l=>{ if(nw>=l.min) cur = l; });
  return cur;
}

function computeAchievements(m){
  const badges = [];
  if(m.balance + m.savings >= 1000000) badges.push('💎 Milioner');
  if(m.loans.length===0) badges.push('🕊️ Bez długów');
  const cryptoVal = Object.entries(m.cryptoHoldings).reduce((s,[c,q])=>s+q*AppState.crypto[c],0);
  if(cryptoVal >= 1000) badges.push('🪙 Krypto Hodler');
  const cryptoKinds = Object.values(m.cryptoHoldings).filter(q=>q>0).length;
  if(cryptoKinds >= 5) badges.push('🌈 Zdywersyfikowany');
  if(m.savings >= 5000) badges.push('🐖 Oszczędny');
  if(m.inventory.length >= 10) badges.push('🛍️ Kolekcjoner');
  if(m.inventory.length >= 30) badges.push('🏆 Superkolekcjoner');
  if(m.bondsHeld.length >= 1) badges.push('📜 Inwestor');
  if(m.quizBest >= 3) badges.push('🧠 Finansowy Mistrz');
  if(m.creditCard && m.creditCard.used===0 && m.creditCard.limit>0) badges.push('✅ Wzorowy płatnik');
  return badges;
}

/* ---------------- month advance ---------------- */
async function advanceMonth(){
  const logs = [];

  // 1. salaries + taxes
  AppState.members.forEach(m=>{
    if(m.job){
      const salary = m.job.salary;
      let rate;
      if(AppState.taxSettings.mode==='auto') rate = autoTaxRate(salary);
      else rate = AppState.taxSettings.manualRate/100;
      const tax = salary*rate;
      const net = salary - tax;
      m.balance += net;
      AppState.vault += tax;
      logs.push(`${m.name}: wypłata ${fmtShort(salary)}, podatek ${fmtShort(tax)} (do skarbca), na konto ${fmtShort(net)}`);
    }
  });

  // 2. savings interest +5%
  AppState.members.forEach(m=>{
    if(m.savings>0){
      const interest = m.savings*0.05;
      m.savings += interest;
      logs.push(`${m.name}: odsetki od oszczędności +${fmtShort(interest)}`);
    }
  });

  // 3. bonds accrual / maturity
  AppState.members.forEach(m=>{
    m.bondsHeld = m.bondsHeld.filter(b=>{
      const monthly = b.principal*b.rate/12;
      b.accrued += monthly;
      b.monthsLeft -= 1;
      if(b.monthsLeft<=0){
        const payout = b.principal + b.accrued;
        m.balance += payout;
        logs.push(`${m.name}: obligacje ${b.name} wykupione, wypłata ${fmtShort(payout)}`);
        return false;
      }
      return true;
    });
  });

  // 4. loans repayment
  AppState.members.forEach(m=>{
    m.loans = m.loans.filter(l=>{
      m.balance -= l.payment;
      l.monthsLeft -= 1;
      if(m.balance < 0) logs.push(`⚠️ ${m.name}: saldo ujemne po spłacie raty pożyczki!`);
      AppState.vault += l.payment;
      if(l.monthsLeft<=0){
        logs.push(`${m.name}: pożyczka spłacona w całości`);
        return false;
      }
      return true;
    });
  });

  // 5. losowe, niespodziewane wydarzenie — zdarza się co miesiąc, każdej rodzinie
  if(AppState.members.length>0){
    const candidates = AppState.members;
    const member = candidates[Math.floor(Math.random()*candidates.length)];
    let pool = RANDOM_EVENTS.filter(e=> !e.needsJob || member.job);
    const ev = pool[Math.floor(Math.random()*pool.length)];
    member.balance += ev.amount;
    logs.push('🎲 '+ev.text(member.name));
  }

  // 5b. karta kredytowa — odsetki od zaległego zadłużenia
  AppState.members.forEach(m=>{
    if(m.creditCard && m.creditCard.used>0){
      const interest = m.creditCard.used * 0.03;
      m.creditCard.used += interest;
      logs.push(`💳 ${m.name}: odsetki od karty kredytowej +${fmtShort(interest)} do spłaty`);
    }
  });

  // 6. crypto prices
  await refreshCryptoPrices(true);

  AppState.month += 1;
  logs.forEach(l=>logHist(l));
  saveState();
  flash(`Rozpoczyna się miesiąc ${AppState.month}.`,'ok');
  render();
}

function navBtn(id,ic,label){
  return `<button class="navbtn ${currentTab===id?'on':''}" data-tab="${id}"><span class="ic">${ic}</span>${label}</button>`;
}

function renderTabContent(){
  switch(currentTab){
    case 'pulpit': return renderPulpit();
    case 'przelewy': return renderPrzelewy();
    case 'praca': return renderPraca();
    case 'inwestycje': return renderInwestycje();
    case 'sklep': return renderSklep();
    case 'miasto': return renderMiasto();
    case 'nauka': return renderNauka();
    case 'ustawienia': return renderUstawienia();
    default: return '';
  }
}

function renderMemberCard(m){
  const badges = computeAchievements(m);
  const cryptoVal = Object.entries(m.cryptoHoldings).reduce((s,[c,q])=>s+q*AppState.crypto[c],0);
  const bondsVal = m.bondsHeld.reduce((s,b)=>s+b.principal+b.accrued,0);
  const debt = m.loans.reduce((s,l)=>s+l.payment*l.monthsLeft,0) + (m.creditCard?m.creditCard.used:0);
  const level = computeLevel(m);
  return `
  <div class="card member-card">
    <div class="member-head">
      <div class="member-id">
        <div class="avatar">${m.avatar}</div>
        <div>
          <div class="member-name">${m.name}</div>
          <div class="member-job">${m.job ? m.job.title+' · '+fmtShort(m.job.salary)+'/mies.' : 'Bez pracy'} · ${level.title}</div>
        </div>
      </div>
    </div>
    <div class="badges">
      ${m.pesel ? `<span class="badge">🪪 Zarejestrowany</span>` : ''}
      ${m.driverLicense ? `<span class="badge">🚗 Prawo jazdy</span>` : ''}
      ${m.creditCard ? `<span class="badge">💳 Karta kredytowa</span>` : ''}
      ${badges.map(b=>`<span class="badge">${b}</span>`).join('')}
    </div>
    <div class="stat-row">
      <div class="stat"><div class="label">Konto</div><div class="value tabular ${m.balance<0?'neg':''}">${fmt(m.balance)}</div></div>
      <div class="stat"><div class="label">Oszczędności</div><div class="value tabular pos">${fmt(m.savings)}</div></div>
    </div>
    ${(cryptoVal>0.01 || bondsVal>0.01 || debt>0.01) ? `
    <div class="stat-row">
      ${cryptoVal>0.01 ? `<div class="stat"><div class="label">Krypto</div><div class="value tabular">${fmt(cryptoVal)}</div></div>` : ''}
      ${bondsVal>0.01 ? `<div class="stat"><div class="label">Obligacje</div><div class="value tabular">${fmt(bondsVal)}</div></div>` : ''}
      ${debt>0.01 ? `<div class="stat"><div class="label">Zadłużenie</div><div class="value tabular neg">${fmt(debt)}</div></div>` : ''}
    </div>` : ''}
  </div>`;
}

/* =========================================================
   EVENT WIRING
   ========================================================= */
function attachMainEvents(){
  document.getElementById('activeMemberSelect').onchange = e=>{ setActiveMemberId(e.target.value); render(); };
  const syncBtn = document.getElementById('syncBtn');
  if(syncBtn) syncBtn.onclick = ()=>{
    if(AppState.roomId) pullRoom(false); else flash('Tryb online nie jest jeszcze włączony — sprawdź zakładkę Więcej.','err');
  };
  document.querySelectorAll('.navbtn').forEach(b=>{
    b.onclick = ()=>{ currentTab = b.dataset.tab; render(); };
  });
  const advBtn = document.getElementById('advanceMonthBtn');
  if(advBtn) advBtn.onclick = async ()=>{ advBtn.disabled=true; advBtn.textContent='Przetwarzanie...'; await advanceMonth(); };

  const doCreateGoal = document.getElementById('doCreateGoal');
  if(doCreateGoal) doCreateGoal.onclick = ()=>{
    createFamilyGoal(document.getElementById('goalName').value, document.getElementById('goalTarget').value);
  };
  const doContributeGoal = document.getElementById('doContributeGoal');
  if(doContributeGoal) doContributeGoal.onclick = ()=>{
    contributeGoal(document.getElementById('goalMember').value, document.getElementById('goalAmount').value);
  };
  const doClearGoal = document.getElementById('doClearGoal');
  if(doClearGoal) doClearGoal.onclick = ()=>{
    if(confirm('Na pewno usunąć obecny cel? Zebrane pieniądze zostaną w skarbcu — nikt ich nie traci.')) clearFamilyGoal();
  };

  // przelewy
  const doTransfer = document.getElementById('doTransfer');
  if(doTransfer) doTransfer.onclick = ()=>{
    const [ft,fid] = document.getElementById('tFrom').value.split(':');
    const [tt,tid] = document.getElementById('tTo').value.split(':');
    const amt = document.getElementById('tAmount').value;
    if(ft===tt && fid===tid) return flash('Wybierz różne konta.','err');
    transfer(ft,fid,tt,tid,amt);
  };
  const doDeposit = document.getElementById('doDeposit');
  if(doDeposit) doDeposit.onclick = ()=>{
    depositSavings(document.getElementById('sMember').value, document.getElementById('sAmount').value);
  };
  const doWithdraw = document.getElementById('doWithdraw');
  if(doWithdraw) doWithdraw.onclick = ()=>{
    withdrawSavings(document.getElementById('sMember').value, document.getElementById('sAmount').value);
  };

  // praca
  document.querySelectorAll('.job-select').forEach(sel=>{
    sel.onchange = e=>{
      const idx = e.target.value;
      const salaryInput = document.querySelector(`.job-salary[data-member="${e.target.dataset.member}"]`);
      if(salaryInput) salaryInput.value = JOBS[idx].salary;
    };
  });
  document.querySelectorAll('[data-setjob]').forEach(btn=>{
    btn.onclick = ()=>{
      const mid = btn.dataset.setjob;
      const sel = document.querySelector(`.job-select[data-member="${mid}"]`);
      const salaryInput = document.querySelector(`.job-salary[data-member="${mid}"]`);
      setJob(mid, JOBS[sel.value].title, salaryInput.value);
    };
  });
  document.querySelectorAll('[data-quit]').forEach(btn=>{
    btn.onclick = ()=>{ quitJob(btn.dataset.quit); };
  });
  const taxModeSel = document.getElementById('taxMode');
  if(taxModeSel) taxModeSel.onchange = ()=>{ AppState.taxSettings.mode = taxModeSel.value; render(); };
  const saveTax = document.getElementById('saveTaxSettings');
  if(saveTax) saveTax.onclick = ()=>{
    const manual = document.getElementById('manualTaxRate');
    if(manual) AppState.taxSettings.manualRate = Number(manual.value);
    saveState(); flash('Zapisano ustawienia podatków.','ok');
  };

  // inwestycje
  const refreshBtn = document.getElementById('refreshPrices');
  if(refreshBtn) refreshBtn.onclick = ()=>refreshCryptoPrices(false);
  const cryptoBuy = document.getElementById('cryptoBuy');
  if(cryptoBuy) cryptoBuy.onclick = ()=>{
    tradeCrypto(document.getElementById('cryptoMember').value, document.getElementById('cryptoCoin').value, document.getElementById('cryptoAmount').value, 'buy');
  };
  const cryptoSell = document.getElementById('cryptoSell');
  if(cryptoSell) cryptoSell.onclick = ()=>{
    tradeCrypto(document.getElementById('cryptoMember').value, document.getElementById('cryptoCoin').value, document.getElementById('cryptoAmount').value, 'sell');
  };
  const bondBuy = document.getElementById('bondBuy');
  if(bondBuy) bondBuy.onclick = ()=>{
    buyBond(document.getElementById('bondMember').value, document.getElementById('bondType').value, document.getElementById('bondAmount').value);
  };
  const loanTake = document.getElementById('loanTake');
  if(loanTake) loanTake.onclick = ()=>{
    takeLoan(document.getElementById('loanMember').value, document.getElementById('loanAmount').value, document.getElementById('loanMonths').value);
  };
  document.querySelectorAll('[data-ccrequest]').forEach(btn=>{
    btn.onclick = ()=>{ requestCreditCard(btn.dataset.ccrequest); };
  });
  document.querySelectorAll('[data-ccpay]').forEach(btn=>{
    btn.onclick = ()=>{
      const input = document.querySelector(`.cc-amount[data-member="${btn.dataset.ccpay}"]`);
      payCreditCard(btn.dataset.ccpay, input.value);
    };
  });

  // sklep
  document.querySelectorAll('[data-cat]').forEach(btn=>{
    btn.onclick = ()=>{ shopCategory = btn.dataset.cat; render(); };
  });
  document.querySelectorAll('[data-buy]').forEach(btn=>{
    btn.onclick = ()=>{ buyItem(getActiveMemberId(), Number(btn.dataset.buy)); };
  });
  const doCustomBuy = document.getElementById('doCustomBuy');
  if(doCustomBuy) doCustomBuy.onclick = ()=>{
    buyCustom(getActiveMemberId(), document.getElementById('customName').value, document.getElementById('customAmount').value);
  };

  // Miasto
  document.querySelectorAll('[data-miasto]').forEach(btn=>{
    btn.onclick = ()=>{ miastoSub = btn.dataset.miasto; render(); };
  });
  document.querySelectorAll('[data-register]').forEach(btn=>{
    btn.onclick = ()=>{
      const mid = btn.dataset.register;
      const birth = document.querySelector(`.reg-birth[data-member="${mid}"]`).value;
      const gender = document.querySelector(`.reg-gender[data-member="${mid}"]`).value;
      const lastname = document.querySelector(`.reg-lastname[data-member="${mid}"]`).value;
      registerCitizen(mid, birth, gender, lastname);
    };
  });
  const startDrivingBtn = document.getElementById('startDrivingExam');
  if(startDrivingBtn) startDrivingBtn.onclick = ()=>{ startDrivingExam(); };
  document.querySelectorAll('.drv-opt').forEach(btn=>{
    btn.onclick = ()=>{
      const qi = btn.dataset.qi, oi = btn.dataset.oi;
      drivingAnswers[qi] = oi;
      document.querySelectorAll(`.drv-opt[data-qi="${qi}"]`).forEach(b=>b.classList.remove('picked'));
      btn.classList.add('picked');
    };
  });
  const submitDriving = document.getElementById('submitDriving');
  if(submitDriving) submitDriving.onclick = ()=>{
    if(Object.keys(drivingAnswers).length < currentDrivingQuiz.length) return flash('Odpowiedz na wszystkie pytania.','err');
    submitDrivingExam(document.getElementById('drivingMember').value, drivingAnswers);
  };
  const browserGo = document.getElementById('browserGo');
  if(browserGo) browserGo.onclick = ()=>{
    const v = document.getElementById('browserUrlInput').value.trim().toLowerCase();
    browserUrl = BROWSER_SITES[v] ? v : 'start.wiki';
    if(!BROWSER_SITES[v]) flash('Nie znaleziono takiej strony w naszej sieci — wracamy na start.','err');
    render();
  };

  // Nauka
  document.querySelectorAll('[data-nauka]').forEach(btn=>{
    btn.onclick = ()=>{ naukaSub = btn.dataset.nauka; render(); };
  });
  const startQuizBtn = document.getElementById('startQuizBtn');
  if(startQuizBtn) startQuizBtn.onclick = ()=>{ startQuiz(); };
  document.querySelectorAll('.fin-opt').forEach(btn=>{
    btn.onclick = ()=>{
      const qi = btn.dataset.qi, oi = btn.dataset.oi;
      financeAnswers[qi] = oi;
      document.querySelectorAll(`.fin-opt[data-qi="${qi}"]`).forEach(b=>b.classList.remove('picked'));
      btn.classList.add('picked');
    };
  });
  const submitQuizBtn = document.getElementById('submitQuiz');
  if(submitQuizBtn) submitQuizBtn.onclick = ()=>{
    if(Object.keys(financeAnswers).length < currentQuiz.length) return flash('Odpowiedz na wszystkie pytania.','err');
    submitQuiz(document.getElementById('quizMember').value, financeAnswers);
  };

  // ustawienia
  document.querySelectorAll('[data-sub]').forEach(btn=>{
    btn.onclick = ()=>{ settingsSub = btn.dataset.sub; render(); };
  });
  const copyRoomId = document.getElementById('copyRoomId');
  if(copyRoomId) copyRoomId.onclick = ()=>{
    navigator.clipboard && navigator.clipboard.writeText(AppState.roomId);
    flash('Skopiowano kod pokoju.','ok');
  };
  const tryOnline = document.getElementById('tryOnline');
  if(tryOnline) tryOnline.onclick = ()=>{ createRoom(false); };
  const manualSync = document.getElementById('manualSync');
  if(manualSync) manualSync.onclick = ()=>{ pullRoom(false); };
  const genCode = document.getElementById('genCode');
  if(genCode) genCode.onclick = ()=>{ document.getElementById('codeOut').value = exportCode(); };
  const copyCode = document.getElementById('copyCode');
  if(copyCode) copyCode.onclick = ()=>{
    const ta = document.getElementById('codeOut');
    if(!ta.value) return flash('Najpierw wygeneruj kod.','err');
    ta.select();
    navigator.clipboard && navigator.clipboard.writeText(ta.value);
    flash('Skopiowano kod.','ok');
  };
  const importBtn = document.getElementById('importBtn');
  if(importBtn) importBtn.onclick = ()=>{
    const val = document.getElementById('codeIn').value;
    if(!val.trim()) return flash('Wklej kod przed importem.','err');
    if(confirm('To nadpisze aktualny stan gry na tym urządzeniu. Kontynuować?')) importCode(val);
  };
  const resetGame = document.getElementById('resetGame');
  if(resetGame) resetGame.onclick = ()=>{
    if(confirm('Na pewno usunąć całą grę na tym urządzeniu?')){
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(ACTIVE_KEY);
      AppState = null;
      currentTab='pulpit';
      render();
    }
  };
}

/* ---------------- init ---------------- */
(function init(){
  AppState = loadState();
  if(AppState){
    migrateState();
    if(!getActiveMemberId() && AppState.members[0]) setActiveMemberId(AppState.members[0].id);
    refreshCryptoPrices(true);
    if(AppState.roomId) pullRoom(true);
  }
  render();
  setInterval(()=>{
    if(AppState && AppState.roomId) pullRoom(true);
  }, 4000);
})();
</script>
</body>
